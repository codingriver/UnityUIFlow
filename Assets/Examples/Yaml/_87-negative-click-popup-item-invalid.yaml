name: Negative Click Popup Item Invalid Value
description: |
  Verifies that click_popup_item fails when given an invalid value.
  This test is expected to FAIL.

fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleCoverageFieldsWindow
    reopen_if_open: true

steps:
  - name: click_popup_item with invalid value should fail
    action: click_popup_item
    selector: "#quick-popup"
    value: "NonExistentValue"
