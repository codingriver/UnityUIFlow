name: Coverage Batch Runner
fixture:
  host_window:
    type: UnityUIFlow.BatchRunnerWindow
    reopen_if_open: true
steps:
  - name: Set target mode to single file
    action: set_value
    selector: "#batch-target-mode"
    value: "SingleFile"
  - name: Set single file target
    action: set_value
    selector: "#batch-target-path"
    value: "Assets/Examples/Yaml/01-basic-login.yaml"
  - name: Set timeout
    action: set_value
    selector: "#batch-timeout"
    value: "5000"
  - name: Toggle headed off
    action: click
    selector: "#batch-headed-toggle"
  - name: Enable screenshot on failure
    action: click
    selector: "#batch-screenshot-on-failure-toggle"
  - name: Enable verbose log
    action: click
    selector: "#batch-verbose-log-toggle"
  - name: Run single file
    action: click
    selector: "#batch-run-button"
  - name: Wait for completion
    action: wait
    duration: "15s"
    timeout: "20s"
  - name: Assert completed status
    action: assert_text_contains
    selector: "#batch-status-label"
    expected: "Status: Completed"
  - name: Assert summary message
    action: assert_text_contains
    selector: "#batch-message-box"
    expected: "Completed 1 case(s)"
  - name: Toggle screenshot off
    action: click
    selector: "#batch-screenshot-on-failure-toggle"
  - name: Toggle verbose log off
    action: click
    selector: "#batch-verbose-log-toggle"
  - name: Run single file again
    action: click
    selector: "#batch-run-button"
  - name: Wait for second run
    action: wait
    duration: "15s"
    timeout: "20s"
  - name: Assert second run status
    action: assert_text_contains
    selector: "#batch-status-label"
    expected: "Status: Completed"
