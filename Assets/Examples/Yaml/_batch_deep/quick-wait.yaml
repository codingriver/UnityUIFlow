name: Quick Wait
fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleWaitForElementWindow
    reopen_if_open: true
steps:
  - action: click
    selector: "#start-button"
  - action: wait_for_element
    selector: "#delayed-message"
    timeout: "2s"
  - action: assert_text
    selector: "#delayed-message"
    expected: "Ready"
