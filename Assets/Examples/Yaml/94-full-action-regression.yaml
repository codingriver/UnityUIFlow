name: Full Action Regression Smoke Test
description: |
 Quick smoke test covering the most commonly used UIToolkit actions
 in a single flow. Designed for fast CI validation of core automation
 capabilities.

fixture:
 host_window:
   type: UnityUIFlow.Examples.ExampleBasicLoginWindow
   reopen_if_open: true

steps:
 # éˆ¹â‚¬éˆ¹â‚¬ Input éˆ¹â‚¬éˆ¹â‚¬
 - name: Enter username
   action: type_text
   selector: "#username-input"
   text: "regression_user"

 - name: Enter password
   action: type_text_fast
   selector: "#password-input"
   text: "regression_pass"

 # éˆ¹â‚¬éˆ¹â‚¬ Interaction éˆ¹â‚¬éˆ¹â‚¬
 - name: Click login
   action: click
   selector: "#login-button"

 # éˆ¹â‚¬éˆ¹â‚¬ Assertion éˆ¹â‚¬éˆ¹â‚¬
 - name: Assert error message
   action: assert_text
   selector: "#status-label"
   text: "Missing credentials"

 - name: Assert login button is visible
   action: assert_visible
   selector: "#login-button"

 # éˆ¹â‚¬éˆ¹â‚¬ Focus and clear éˆ¹â‚¬éˆ¹â‚¬
 - name: Focus username
   action: focus
   selector: "#username-input"

 - name: Select all and delete
   action: press_key_combination
   keys: "Ctrl+A"

 - name: Type replacement
   action: type_text
   selector: "#username-input"
   text: "admin"

 - name: Focus password
   action: focus
   selector: "#password-input"

 - name: Clear password
   action: press_key_combination
   keys: "Ctrl+A"

 - name: Type new password
   action: type_text_fast
   selector: "#password-input"
   text: "admin123"

 # éˆ¹â‚¬éˆ¹â‚¬ Re-login éˆ¹â‚¬éˆ¹â‚¬
 - name: Click login again
   action: click
   selector: "#login-button"

 - name: Assert welcome message
   action: assert_text_contains
   selector: "#status-label"
   text: "Welcome"

 # éˆ¹â‚¬éˆ¹â‚¬ Wait and screenshot éˆ¹â‚¬éˆ¹â‚¬
 - name: Wait briefly
   action: wait
   duration: "500ms"

 - name: Capture final state
   action: screenshot
   tag: "regression_final"