name: Coverage Layout And Scroller
fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleCoverageCollectionsWindow
    reopen_if_open: true
steps:
  - action: set_split_view_size
    selector: "#workspace-split"
    pane: "0"
    size: "220"
  - action: assert_text_contains
    selector: "#split-status"
    expected: "220"
  - action: page_scroller
    selector: "#standalone-scroller"
    direction: "next"
    pages: "2"
    page_size: "12.5"
  - action: assert_text
    selector: "#scroller-status"
    expected: "Scroller: 35"
  - action: select_tab
    selector: "#settings-tabs"
    label: "About"
  - action: assert_text
    selector: "#tab-selection-status"
    expected: "Tab: About"
