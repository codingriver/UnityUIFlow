name: CSV Driven Login
data:
  from_csv: users.csv
steps:
  - name: Fill username {{ username }}
    action: type_text_fast
    selector: "#username-input"
    value: "{{ username }}"
  - name: Fill password
    action: type_text_fast
    selector: "#password-input"
    value: "{{ password }}"
  - name: Click login
    action: click
    selector: "#login-button"
  - name: Assert welcome
    action: assert_text_contains
    selector: "#status-label"
    expected: "{{ expected }}"
